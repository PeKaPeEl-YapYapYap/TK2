{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Biodata</title>
    <style>
      body { font-family: Arial, sans-serif; padding: 24px; background: #f7f7f9; }
      .container { max-width: 900px; margin: 0 auto; }
      h1 { text-align: center; color: #333; }
      .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-top: 20px; }
      .card { background: #fff; border: 1px solid #e1e1e6; padding: 14px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
      .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 6px; margin-bottom: 10px; }
      .name { font-weight: 700; color: #111; font-size: 1.1em; }
      .meta { color: #555; font-size: 0.95em; margin-top: 6px; }
      .small { font-size: 0.85em; color: #777; margin-top: 10px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Daftar Biodata</h1>

      <div class="cards">
        {% for person in biodata_list %}
        <div class="card">
          {% if person.gambar %}
            <img src="{{ person.gambar }}" alt="{{ person.nama }}">
          {% endif %}
          <div class="name">{{ person.nama }}</div>
          <div class="meta">Umur: {{ person.umur }} &middot; Prodi: {{ person.prodi }}</div>
          <div class="meta">NPM: {{ person.npm }}</div>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
